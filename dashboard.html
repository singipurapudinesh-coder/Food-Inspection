<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Dashboard</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<nav>

    <h2>🍲 AI Food Inspection Pro</h2>

    <div>

        <a href="{{ url_for('inspect') }}">

            Inspect Food

        </a>

        <a href="{{ url_for('history') }}">

            History

        </a>

        <a href="{{ url_for('admin') }}">

            Admin

        </a>

        <a href="{{ url_for('logout') }}">

            Logout

        </a>

    </div>

</nav>


<div class="dashboard">

    <h1>

        Welcome {{ current_user.name }}

    </h1>


    <div class="cards">

        <div class="card">

            <p>Users</p>

            <h2>

                {{ stats.users }}

            </h2>

        </div>


        <div class="card">

            <p>Inspections</p>

            <h2>

                {{ stats.inspections }}

            </h2>

        </div>


        <div class="card">

            <p>Healthy</p>

            <h2>

                {{ stats.healthy }}

            </h2>

        </div>


        <div class="card">

            <p>Unhealthy</p>

            <h2>

                {{ stats.unhealthy }}

            </h2>

        </div>

    </div>


    <div class="chart-container">

        <canvas id="chart"></canvas>

    </div>

</div>


<script>

document.addEventListener(

    "DOMContentLoaded",

    function () {

        const ctx = document
        .getElementById("chart")
        .getContext("2d");

        const healthy = Number(

            "{{ stats.healthy }}"

        );

        const unhealthy = Number(

            "{{ stats.unhealthy }}"

        );

        new Chart(

            ctx,

            {

                type: "doughnut",

                data: {

                    labels: [

                        "Healthy",

                        "Unhealthy"

                    ],

                    datasets: [

                        {

                            data: [

                                healthy,

                                unhealthy

                            ],

                            backgroundColor: [

                                "#27ae60",

                                "#e74c3c"

                            ],

                            borderWidth: 1

                        }

                    ]

                },

                options: {

                    responsive: true,

                    maintainAspectRatio: false,

                    plugins: {

                        legend: {

                            position: "bottom"

                        }

                    }

                }

            }

        );

    }

);

</script>

</body>

</html>
