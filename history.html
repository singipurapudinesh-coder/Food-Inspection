<!DOCTYPE html>

<html>

<head>

<title>

History

</title>

<link

rel="stylesheet"

href="{{ url_for('static',filename='css/style.css') }}">

</head>

<body>

<div class="container">

<h1>

📈 Inspection History

</h1>


<table>

<tr>

<th>

Food

</th>


<th>

Score

</th>


<th>

Status

</th>


<th>

Date

</th>

</tr>


{% for row in history %}

<tr>

<td>

{{ row.food_name }}

</td>


<td>

{{ row.health_score }}

</td>


<td>

{{ row.healthy_status }}

</td>


<td>

{{ row.created_at }}

</td>

</tr>

{% endfor %}

</table>


<a href="/dashboard">

Back

</a>

</div>

</body>

</html>
